<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#070a13" />
  <!-- Logo Icon: A Shield combined with Hourglass and Clock -->
  <g transform="translate(106, 106)" filter="url(#glow)">
    <!-- Outer Shield/Circle -->
    <circle cx="150" cy="150" r="130" fill="none" stroke="url(#aurora)" stroke-width="14" stroke-linecap="round" />
    <!-- Clock Hands / Hourglass -->
    <path d="M 150 50 L 150 150 L 220 180" stroke="url(#aurora)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Hourglass shape -->
    <path d="M 100 90 L 200 90 L 150 150 L 100 210 L 200 210" stroke="url(#aurora)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3" />
    <!-- Inner glowing dot -->
    <circle cx="150" cy="150" r="10" fill="#00f2fe" />
  </g>
</svg>
